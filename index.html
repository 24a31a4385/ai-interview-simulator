<!DOCTYPE html>
<html>
<head>
  <title>Smart AI Interview Trainer</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 30px;
      background: #121212;
      color: white;
    }
    select, textarea, button {
      margin: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }
    textarea {
      width: 300px;
      height: 100px;
    }
    button {
      background: #00adb5;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #007b80;
    }
    .card {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
    }
  </style>
</head>

<body>
<div class="card">
<h2>🤖 Smart AI Interview Trainer</h2>

<select id="role">
  <option value="frontend">Frontend</option>
  <option value="backend">Backend</option>
  <option value="hr">HR</option>
</select>

<select id="difficulty">
  <option value="easy">Easy</option>
  <option value="medium">Medium</option>
  <option value="hard">Hard</option>
</select>

<br>
<button id="startBtn">Start Interview</button>

<h3 id="question">Your question will appear here</h3>

<textarea id="answer" placeholder="Type your answer"></textarea>

<br>
<button id="submitBtn">Submit</button>

<h3 id="result"></h3>
<h3 id="scoreTotal"></h3>
</div>

<script>
let currentQuestion = "";
let totalScore = 0;
let questionCount = 0;

// Questions
const questions = {
  frontend: {
    easy: ["What is HTML?", "What is CSS?"],
    medium: ["Explain React hooks", "What is Virtual DOM?"],
    hard: ["Explain React lifecycle deeply"]
  },
  backend: {
    easy: ["What is Node.js?"],
    medium: ["Explain REST API"],
    hard: ["Explain authentication & JWT"]
  },
  hr: {
    easy: ["Tell me about yourself"],
    medium: ["Why should we hire you?"],
    hard: ["Describe a failure situation"]
  }
};

// BUTTONS
const startBtn = document.getElementById("startBtn");
const submitBtn = document.getElementById("submitBtn");

// Start Interview
startBtn.addEventListener("click", () => {
  const role = document.getElementById("role").value;
  const level = document.getElementById("difficulty").value;

  if (!questions[role] || !questions[role][level]) {
    alert("No questions found for this selection!");
    return;
  }

  const list = questions[role][level];
  const randomIndex = Math.floor(Math.random() * list.length);
  currentQuestion = list[randomIndex];

  document.getElementById("question").innerText = currentQuestion;
  document.getElementById("result").innerText = "";
  document.getElementById("answer").value = "";
});

// Submit Answer
submitBtn.addEventListener("click", () => {
  const answer = document.getElementById("answer").value.trim();

  if (!answer) {
    alert("Please enter your answer!");
    return;
  }

  let score = 5;
  if (answer.length > 80) score = 10;
  else if (answer.length > 40) score = 8;

  totalScore += score;
  questionCount++;

  document.getElementById("result").innerText =
    "Score: " + score + (score >= 8 ? " | Excellent 🔥" : " | Improve");
  document.getElementById("scoreTotal").innerText =
    "Total Score: " + totalScore + " / " + (questionCount * 10);

  document.getElementById("answer").value = "";
});
</script>
</body>
</html>
