<!DOCTYPE html>
<html>
<head>
  <title>Smart AI Interview Trainer</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 30px;
      background: #121212;
      color: white;
    }

    select, textarea, button {
      margin: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    textarea {
      width: 300px;
      height: 100px;
    }

    button {
      background: #00adb5;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #007b80;
    }

    .card {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
    }
  </style>
</head>

<body>

<div class="card">
<h2>🤖 Smart AI Interview Trainer</h2>

<select id="role">
  <option value="frontend">Frontend</option>
  <option value="backend">Backend</option>
  <option value="hr">HR</option>
</select>

<select id="difficulty">
  <option value="easy">Easy</option>
  <option value="medium">Medium</option>
  <option value="hard">Hard</option>
</select>

<br>

<button onclick="startInterview()">Start Interview</button>

<h3 id="timer">⏱ Time: 60</h3>

<h3 id="question"></h3>

<textarea id="answer" placeholder="Type your answer"></textarea>

<br>

<button onclick="submitAnswer()">Submit</button>

<h3 id="result"></h3>
<h3 id="scoreTotal"></h3>
</div>

<script>
let currentQuestion = "";
let timeLeft = 60;
let timer;
let totalScore = 0;
let questionCount = 0;

const questions = {
  frontend: {
    easy: ["What is HTML?", "What is CSS?","What is Javascript?","What is Display Property?"],
    medium: ["Explain React hooks", "What is Virtual DOM?","What is Closure?","What is Event Bubbling?"],
    hard: ["Explain React lifecycle deeply","Explain Event Loop in Javascript?","What is CORS?"]
  },
  backend: {
    easy: ["What is Node.js?","What is Primary Key?","What is JSON?"],
    medium: ["Explain REST API","Explain Indexing?","SQL vs NoSQL difference?"],
    hard: ["Explain authentication & JWT","Explain XSS?"]
  },
  hr: {
    easy: ["Tell me about yourself""What are your Strenghts","Why do you want this Job"],
    medium: ["Why should we hire you?","What are your long-term goals","Why did you choose this field"],
    hard: ["Describe a failure situation"]
  }
};

function startInterview() {
  const role = document.getElementById("role").value;
  const level = document.getElementById("difficulty").value;

  const list = questions[role][level];
  currentQuestion = list[Math.floor(Math.random() * list.length)];

  document.getElementById("question").innerText = currentQuestion;

  startTimer();
}

function startTimer() {
  timeLeft = 60;
  clearInterval(timer);

  timer = setInterval(() => {
    timeLeft--;
    document.getElementById("timer").innerText = "⏱ Time: " + timeLeft;

    if (timeLeft <= 0) {
      clearInterval(timer);
      alert("Time's up!");
    }
  }, 1000);
}

function submitAnswer() {
  clearInterval(timer);

  const answer = document.getElementById("answer").value;

  let score = 5;
  if (answer.length > 80) score = 10;
  else if (answer.length > 40) score = 8;

  totalScore += score;
  questionCount++;

  document.getElementById("result").innerText =
    "Score: " + score + (score >= 8 ? " | Excellent 🔥" : " | Improve");

  document.getElementById("scoreTotal").innerText =
    "Total Score: " + totalScore + " / " + (questionCount * 10);

  document.getElementById("answer").value = "";
}
</script>

</body>
</html>
