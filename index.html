<!DOCTYPE html>
<html>
<head>
  <title>Smart AI Interview Trainer</title>
</head>

<body style="text-align:center; font-family:Arial; background:#121212; color:white;">

<h2>🤖 Smart AI Interview Trainer</h2>

<select id="role">
  <option value="frontend">Frontend</option>
  <option value="backend">Backend</option>
  <option value="hr">HR</option>
</select>

<select id="difficulty">
  <option value="easy">Easy</option>
  <option value="medium">Medium</option>
  <option value="hard">Hard</option>
</select>

<br><br>

<button onclick="startInterview()">Start Interview</button>

<h3 id="question">Question will appear here</h3>

<textarea id="answer" placeholder="Type answer"></textarea>

<br><br>

<button onclick="submitAnswer()">Submit</button>

<h3 id="result"></h3>

<script>
let currentQuestion = "";

const questions = {
  frontend: {
    easy: ["What is HTML?", "What is CSS?"],
    medium: ["Explain React hooks", "What is Virtual DOM?"],
    hard: ["Explain React lifecycle deeply"]
  },
  backend: {
    easy: ["What is Node.js?"],
    medium: ["Explain REST API"],
    hard: ["Explain authentication & JWT"]
  },
  hr: {
    easy: ["Tell me about yourself"],
    medium: ["Why should we hire you?"],
    hard: ["Describe a failure situation"]
  }
};

function startInterview() {
  const role = document.getElementById("role").value;
  const level = document.getElementById("difficulty").value;

  console.log(role, level); // debug

  if (!questions[role] || !questions[role][level]) {
    alert("Question not found!");
    return;
  }

  const list = questions[role][level];

  const randomIndex = Math.floor(Math.random() * list.length);
  currentQuestion = list[randomIndex];

  document.getElementById("question").innerText = currentQuestion;
}

function submitAnswer() {
  const answer = document.getElementById("answer").value;

  if (!answer) {
    alert("Enter answer first");
    return;
  }

  let score = answer.length > 30 ? 10 : 5;

  document.getElementById("result").innerText =
    "Score: " + score;
}
</script>

</body>
</html>
